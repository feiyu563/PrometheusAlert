# PrometheusAlert 告警去重聚合配置示例

# 去重配置
[deduplication]
# 是否启用去重功能
enabled = true
# 时间窗口，相同告警在此时间内被认为是重复的
time_window = 300s
# 最大重复次数，超过此次数将被抑制
max_count = 5
# 是否抑制恢复告警
suppress_resolved = true
# 分组标签，用于生成告警指纹
group_by_labels = alertname,instance,severity
# 去重策略：strict(严格), loose(宽松), severity_based(基于严重级别), custom_rule(自定义规则)
policy = strict

# 聚合配置
[aggregation]
# 是否启用聚合功能
enabled = false
# 聚合时间窗口
time_window = 60s
# 最大聚合告警数
max_alerts = 10
# 聚合分组标签
group_by_labels = alertname,severity
# 聚合策略：count(计数), list(列表), summary(摘要)
strategy = summary
# 刷新间隔
flush_interval = 30s

# 缓存配置
[cache]
# 缓存类型：memory(内存), redis(Redis)
type = memory
# 最大缓存大小
max_size = 10000
# 缓存TTL
ttl = 3600s
# 清理间隔
cleanup_interval = 300s
# Redis配置（当type=redis时使用）
redis_addr = localhost:6379
redis_password = 
redis_db = 0

# 指纹配置
[fingerprint]
# 哈希算法：md5, sha256
algorithm = md5
# 参与指纹计算的字段
include_fields = alert_name,instance,labels
# 排除的标签（支持前缀匹配）
exclude_labels = __name__,__tmp_,receive_time
# 包含的标签（为空则包含所有，除了排除的）
include_labels = 

# 示例自定义规则（在代码中通过API配置）
# 规则名称：critical_alerts
# 条件：severity = critical
# 动作：允许更多重复发送
# 
# 规则名称：info_alerts  
# 条件：severity = info
# 动作：减少重复发送频率
#
# 规则名称：maintenance_suppress
# 条件：labels.maintenance = true
# 动作：完全抑制告警