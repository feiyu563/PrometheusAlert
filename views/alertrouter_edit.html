{{template "main" .}}
  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Left navbar links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <a href="/alertrouter" class="nav-link">告警管理</a>
      </li>
    </ul>
  </nav>
  <!-- /.navbar -->

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>编辑告警路由</h1>
          </div>
        </div>
      </div><!-- /.container-fluid -->
    </section>

    <!-- Main content -->
    <section class="content">

      <!-- Default box -->
      <div class="card">
        <div class="card-header bg-navy">
          <h3 class="card-title"><i class="fas fa-edit mr-2"></i> 编辑已有的 Prometheus 告警路由</h3>
          <div class="card-tools">
            <button type="button" class="btn btn-tool text-white" data-card-widget="collapse" title="Collapse">
              <i class="fas fa-minus"></i>
            </button>
          </div>
        </div>
        <div class="card-body">

			<form class="form-horizontal" method="POST" action="##" enctype="multipart/form-data" onsubmit="return false" id="formtpl">
			<input id="id" type="hidden" name="id" value="{{.AlertRouter.Id}}">
			
			  <div class="row mb-3">
				<div class="col-sm-6">
				  <div class="form-group">
					<label class="form-label text-dark">* 路由名称 (Router Name)</label>
					<input type="text" id="name" class="form-control" name="name" value="{{.AlertRouter.Name}}" placeholder="请输入路由名称，如 微信磁盘告警路由">
				  </div>
				</div>
			  
				<div class="col-sm-6">
				  <div class="form-group">
					<label class="form-label text-dark">* 生效通知模版名称 (Tpl Name)</label>
					<select class="form-control" name="tpl_id" id="tpl_id">
					<option value="{{.AlertRouter.Tpl.Id}}">{{.AlertRouter.Tpl.Tplname}}</option>
					</select>
				  </div>
				</div>
			  </div>
			
			  <div class="row" style="display:none;">
				<div class="col-sm-6">
				  <div class="form-group">
					<label>模版类型</label>
					<input type="text" id="tpltype" class="form-control" name="tpltype" value="{{.AlertRouter.Tpl.Tpltype}}" disabled>
				  </div>
				</div>
			  </div>

			<br />
            
            <label class="form-label text-dark font-weight-bold"><i class="fas fa-tags text-indigo"></i> 配置标签匹配规则项 (AND 且关系)</label>
			<div id="labelx" class="mt-2"></div>

			  <div class="row mb-3">
				<div class="col-sm-6">
				  <div class="form-group">
					<button id='labeladd' type="button" class="btn btn-sm btn-outline-primary"><i class="fas fa-plus mr-1"></i> 添加过滤规则项</button>
				  </div>
				</div>
			  </div>
			  

			<div class="row mb-3">
				<div class="col-sm-6">
					<div class="form-group">
						<label class="form-label text-dark">是否发送恢复告警 (Resolved)</label>
						<select class="form-control" name="send_resolved" id="send_resolved">
						</select>
					</div>
				</div>

				<div class="col-sm-6">
					<div class="form-group">
						<label class="form-label text-dark">是否启用该路由</label>
						<div class="custom-control custom-switch" style="margin-top: 6px;">
							<input type="checkbox" class="custom-control-input" id="status" name="status" {{if ne .AlertRouter.Status 2}}checked{{end}}>
							<label class="custom-control-label font-weight-normal text-muted" for="status">勾选启用该路由转发规则</label>
						</div>
					</div>
				</div>
			</div>

			<div class="row mb-3">
				<div class="col-sm-6">
					<div class="form-group">
						<label class="form-label text-dark"><i class="far fa-clock text-primary mr-1"></i> 每日生效开始时间 (Daily Start)</label>
						<input type="time" id="time_range_start" class="form-control" name="time_range_start" value="{{if .AlertRouter.TimeRangeStart}}{{.AlertRouter.TimeRangeStart}}{{else}}00:00{{end}}">
					</div>
				</div>
				<div class="col-sm-6">
					<div class="form-group">
						<label class="form-label text-dark"><i class="far fa-clock text-danger mr-1"></i> 每日生效结束时间 (Daily End)</label>
						<input type="time" id="time_range_end" class="form-control" name="time_range_end" value="{{if .AlertRouter.TimeRangeEnd}}{{.AlertRouter.TimeRangeEnd}}{{else}}23:59{{end}}">
					</div>
				</div>
			</div>

			<div class="row">
				<div id="Purl" class="col-sm-6">
				  <div class="form-group">
					<label id="typestr" class="form-label text-dark">钉钉机器人地址</label>
					<input type="text" id="purl" class="form-control" name="purl" value="{{.AlertRouter.UrlOrPhone}}" placeholder="请输入对应的 URL 或 目标终端信息">
				  </div>
				</div>

				<div id="Pat" class="col-sm-5">
				  <div class="form-group">
					<label id="typestr" class="form-label text-dark">@某人</label>
					<input type="text" id="pat" class="form-control" name="pat" value="{{.AlertRouter.AtSomeOne}}" placeholder="手机号、帐号或Email。多个请以逗号分隔。">
				  </div>
				</div>

				<div id="Patrr" class="col-sm-1" style="vertical-align: bottom;">
					<div class="form-group" style="margin-top: 36px;">
                        <div class="custom-control custom-checkbox">
                            <input id="patrr" class="custom-control-input" name="patrr" type="checkbox">
                            <label class="custom-control-label font-weight-normal text-muted" for="patrr">轮询</label>
                        </div>
					</div>
				</div>

				<div id="Party" class="col-sm-6" style="display:none">
				  <div class="form-group">
					<label id="typestr" class="form-label text-dark">接受部门</label>
					<input type="text" id="pparty" class="form-control" name="pparty" value="">
				  </div>
				</div>

				<div id="Tag" class="col-sm-6" style="display:none">
				  <div class="form-group">
					<label id="typestr" class="form-label text-dark">接受标签</label>
					<input type="text" id="ptag" class="form-control" name="ptag" value="">
				  </div>
				</div>

			  </div>

			<br />

			<div class="text-right">
              <button class="btn btn-success font-weight-bold" onclick="savetpl();">
                <i class="fas fa-save mr-1"></i> 保存告警路由
              </button>
			</div>
			</form>

        </div>
        <!-- /.card-body -->
        <div class="card-footer bg-light">
          <i class="fas fa-info-circle text-info"></i> <strong>提示：</strong>告警路由是实现告警消息分发、合并及差异化发送的目标网关核心组件。
        </div>
        <!-- /.card-footer-->
      </div>
      <!-- /.card -->

    </section>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->
{{template "endhtml"}}
<script>
$(function () {
	typeChange();
	loadRules();
	loadSendResolved();
	loadAtSomeOneRR();
	$('#labeladd').click(function(){
	    var labeldiv='<div class="row"> \
				<div class="col-4"> \
				  <div class="form-group"> \
					<label class="small text-muted">Label Name</label> \
					<input type="text" id="rules" class="form-control" name="rules" value=""  placeholder="规则如 app=nginx,env=test"> \
				  </div> \
				</div> \
				<div class="col-3"> \
				  <div class="form-group"> \
					<label class="small text-muted">Operator</label> \
					<select id="rulesoperator" class="form-control" name="rulesoperator"> \
					  <option value="==" selected>== (等于)</option> \
					  <option value="!=">!= (不等于)</option> \
					  <option value="=~">=~ (正则匹配)</option> \
					  <option value="!~">!~ (正则不匹配)</option> \
					</select> \
				  </div> \
				</div> \
				<div class="col-4"> \
				  <div class="form-group"> \
					<label class="small text-muted">Label Value</label> \
					<input type="text" id="rulesvalue" class="form-control" name="rulesvalue" value=""  placeholder="规则如 app=nginx,env=test"> \
				  </div> \
				</div> \
				<div class="col-sm-1 d-flex align-items-center"> \
				  <div class="form-group" style="margin-top: 24px;"> \
					<button id="labeldel" type="button" class="btn btn-sm btn-danger btn-flat"><i class="fa fa-trash"></i></button> \
				  </div> \
				</div></div><br />';
		$('#labelx').append(labeldiv)
	});
	
	$("#labelx").delegate('#labeldel','click',function(){
		$(this).parents(".row").remove();
	});
	
})

function loadSendResolved(){
	var select = document.getElementById('send_resolved');
	var sendResolved={{.AlertRouter.SendResolved}};
	if (sendResolved === false) {
		select.insertAdjacentHTML('beforeend', `<option value="false" selected>不发送</option>`)
		select.insertAdjacentHTML('beforeend', `<option value="true" >发送</option>`)
	} else {
		select.insertAdjacentHTML('beforeend', `<option value="false" >不发送</option>`)
		select.insertAdjacentHTML('beforeend', `<option value="true" selected>发送</option>`)
	}
}

function loadRules(){
	var rules_str={{.AlertRouter.Rules}};
	var rules_data = JSON.parse(rules_str);
	rules_data.forEach(function(rule_data){
		var op = rule_data.Operator || "";
		if (op === "") {
			if (rule_data.Regex) {
				op = "=~";
			} else {
				op = "==";
			}
		}
		var is_eq = op === "==" ? "selected" : "";
		var is_neq = op === "!=" ? "selected" : "";
		var is_reg = op === "=~" ? "selected" : "";
		var is_nreg = op === "!~" ? "selected" : "";

		var labeldiv='<div class="row"> \
				<div class="col-4"> \
				  <div class="form-group"> \
					<label class="small text-muted">Label Name</label> \
					<input type="text" id="rules" class="form-control" name="rules" value="'+rule_data.Name+'"  placeholder="规则如 app=nginx,env=test"> \
				  </div> \
				</div> \
				<div class="col-3"> \
				  <div class="form-group"> \
					<label class="small text-muted">Operator</label> \
					<select id="rulesoperator" class="form-control" name="rulesoperator"> \
					  <option value="==" '+is_eq+'>== (等于)</option> \
					  <option value="!=" '+is_neq+'>!= (不等于)</option> \
					  <option value="=~" '+is_reg+'>=~ (正则匹配)</option> \
					  <option value="!~" '+is_nreg+'>!~ (正则不匹配)</option> \
					</select> \
				  </div> \
				</div> \
				<div class="col-4"> \
				  <div class="form-group"> \
					<label class="small text-muted">Label Value</label> \
					<input type="text" id="rulesvalue" class="form-control" name="rulesvalue" value="'+rule_data.Value+'"  placeholder="规则如 app=nginx,env=test"> \
				  </div> \
				</div> \
				<div class="col-sm-1 d-flex align-items-center"> \
				  <div class="form-group" style="margin-top: 24px;"> \
					<button id="labeldel" type="button" class="btn btn-sm btn-danger btn-flat"><i class="fa fa-trash"></i></button> \
				  </div> \
				</div></div><br />';
		$('#labelx').append(labeldiv)
	});
	
}

function loadAtSomeOneRR(){
	var checkbox = document.getElementById('patrr');
	var atSomeOneRR={{.AlertRouter.AtSomeOneRR}};
	if (atSomeOneRR === true) {
		checkbox.checked = true
	}
}

function typeChange(){
 var tpl_id = document.getElementById("tpl_id");
 var tpltype = document.getElementById("tpltype");
 var typeStr = document.getElementById("typestr");
 var tpl_idSelect = tpl_id.options[tpl_id.selectedIndex].value; //get id
 
 if (tpltype.value=="dd"){
	typeStr.innerText="钉钉机器人地址(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="";
	document.getElementById("Patrr").style.display="";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="wx"){
	typeStr.innerText="微信机器人地址(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="";
	document.getElementById("Patrr").style.display="";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="fs"){
	typeStr.innerText="飞书机器人地址(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="";
	document.getElementById("Patrr").style.display="";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="fsapp"){
	typeStr.innerText="飞书 用户open_id、user_id、union_ids、部门open_department_id";
	document.getElementById("Purl").style.display="none";
	document.getElementById("Pat").style.display="";
	document.getElementById("Patrr").style.display="";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="voice"){
	typeStr.innerText="";
	document.getElementById("Purl").style.display="none";
	document.getElementById("Pat").style.display="none";
	document.getElementById("Patrr").style.display="none";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="webhook"){
	typeStr.innerText="webhook地址(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="none";
	document.getElementById("Patrr").style.display="none";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="email"){
	typeStr.innerText="邮箱(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Patrr").style.display="none";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="rl"){
	typeStr.innerText="百度Hi(如流)群id";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="none";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 } else if(tpltype.value=="workwechat"){
    alert("workwechat暂不支持告警路由，待后期开启!");
 } else{
	typeStr.innerText="手机号(多个请以,隔开)";
	document.getElementById("Purl").style.display="";
	document.getElementById("Pat").style.display="none";
	document.getElementById("Patrr").style.display="none";
	document.getElementById("Party").style.display="none";
	document.getElementById("Tag").style.display="none";
 }
 
}

function savetpl(){
	var uname=document.getElementById("rules");
	if (uname.value.length==0){
		alert('路由规则不能为空');
		return
	};

	//取到所有rules
	var RouterRules =new Array();
	$("#labelx > div").each(function() {
		var op = $(this).find("#rulesoperator").val();
		var LabelMap={
			Name: $(this).find("#rules").val(),
			Value: $(this).find("#rulesvalue").val(),
			Regex: op === "=~" || op === "!~",
			Operator: op
		};
		RouterRules.push(LabelMap);
	});

	//获取send_resolved值, 转为Boolean类型
	var send_resolved = document.getElementById("send_resolved").value;
	if (send_resolved === "true" || send_resolved === "false"){
		send_resolved=send_resolved==='true'
	}

	var alert_router_json_str={
		RouterId: $('#id').val(),
		RouterName: $('#name').val(),
		RouterTplId: $('#tpl_id').val(),
		RouterPurl: $('#purl').val(),
		RouterPat: $('#pat').val(),
		RouterPatRR: $("#patrr").is(":checked"),
		RouterSendResolved: send_resolved,
		RouterStatus: $("#status").is(":checked") ? 0 : 2,
		RouterTimeRangeStart: $('#time_range_start').val(),
		RouterTimeRangeEnd: $('#time_range_end').val(),
		Rules: RouterRules
	};

	var json_data = JSON.stringify(alert_router_json_str);
	$.ajax({
		type: "POST",
		dataType: "json",
		url: '{{ urlfor "MainController.AddRouter"}}',
		data: json_data,
		success: function (result) {
			console.log(result);
			if (result == null) {
				alert("告警路由保存成功!");
				window.location.replace("/alertrouter")
			} else {
				alert("告警路由保存失败!");
			};
		},
	});

}
</script>
{{template "jshtml"}}
