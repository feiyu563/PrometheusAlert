{{template "main" .}}
  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <a href="/oncall" class="nav-link">值班管理</a>
      </li>
    </ul>
  </nav>
  <!-- /.navbar -->

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>{{if .OnCall}}编辑{{else}}添加{{end}}值班安排</h1>
          </div>
        </div>
      </div><!-- /.container-fluid -->
    </section>

    <!-- Main content -->
    <section class="content">
        <div class="card card-primary">
            <div class="card-header bg-navy">
              <h3 class="card-title">{{if .OnCall}}编辑{{else}}添加{{end}}值班安排</h3>
            </div>
            <!-- /.card-header -->
            <!-- form start -->
            <form role="form" action="/oncall/save" method="post">
              <input type="hidden" name="id" value="{{.OnCall.Id}}">
              <div class="card-body">
                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="start_date">开始日期</label>
                      <input type="date" class="form-control" id="start_date" name="start_date" value="{{.StartDate}}" required>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="end_date">结束日期</label>
                      <input type="date" class="form-control" id="end_date" name="end_date" value="{{.EndDate}}" required>
                    </div>
                  </div>
                </div>
                <div class="form-group">
                    <label>值班人员 (按主备顺序填写)</label>
                    <div id="users-container">
                        {{if .Users}}
                            {{range .Users}}
                            <div class="input-group mb-2 user-row">
                                <input type="text" class="form-control" name="name[]" placeholder="姓名" value="{{.Name}}">
                                <input type="text" class="form-control" name="phone[]" placeholder="手机号" value="{{.Phone}}">
                                <div class="input-group-append">
                                    <button class="btn btn-danger remove-user-btn" type="button"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            {{end}}
                        {{else}}
                            <div class="input-group mb-2 user-row">
                                <input type="text" class="form-control" name="name[]" placeholder="姓名">
                                <input type="text" class="form-control" name="phone[]" placeholder="手机号">
                                <div class="input-group-append">
                                    <button class="btn btn-danger remove-user-btn" type="button"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        {{end}}
                    </div>
                    <button type="button" id="add-user-btn" class="btn btn-sm btn-success mt-2"><i class="fas fa-plus"></i> 添加更多人员</button>
                </div>
              </div>
              <!-- /.card-body -->

              <div class="card-footer">
                <button type="submit" class="btn btn-primary">提交</button>
                <a href="/oncall" class="btn btn-default float-right">取消</a>
              </div>
            </form>
          </div>
    </section>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->
{{template "endhtml"}}
<script>
$(function() {
    // Add user row
    $('#add-user-btn').on('click', function() {
        var userRow = `
        <div class="input-group mb-2 user-row">
            <input type="text" class="form-control" name="name[]" placeholder="姓名">
            <input type="text" class="form-control" name="phone[]" placeholder="手机号">
            <div class="input-group-append">
                <button class="btn btn-danger remove-user-btn" type="button"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
        $('#users-container').append(userRow);
    });

    // Remove user row
    $('#users-container').on('click', '.remove-user-btn', function() {
        if ($('.user-row').length > 1) {
            $(this).closest('.user-row').remove();
        } else {
            alert("至少需要一名值班人员。");
        }
    });
});
</script>
{{template "jshtml"}}
